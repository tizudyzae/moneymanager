<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f9fc" />
  <title>Expense Tracker Prototype</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --card:#ffffff;
      --text:#15203a;
      --muted:#73809a;
      --line:#e3e8f1;
      --purple:#5b5bf5;
      --purple-soft:#eeedff;
      --green:#10a56f;
      --red:#ef4e4e;
      --orange:#ff8a32;
      --shadow:0 14px 40px rgba(25,39,75,.10);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
      padding-bottom:190px;
    }

    button,input{font:inherit}
    button{cursor:pointer}

    .desktop-sidebar{display:none}

    .app-shell{
      width:min(100%,900px);
      margin:0 auto;
      padding:18px 18px 40px;
    }

    .mobile-header{
      position:sticky;
      top:0;
      z-index:20;
      display:grid;
      grid-template-columns:44px 1fr 44px;
      align-items:center;
      gap:10px;
      padding:calc(10px + env(safe-area-inset-top)) 0 14px;
      background:rgba(247,249,252,.92);
      backdrop-filter:blur(16px);
    }

    .icon-btn{
      width:44px;height:44px;border:0;border-radius:14px;
      display:grid;place-items:center;
      background:transparent;color:var(--text);
      font-size:24px;
    }

    .add-btn{
      background:var(--purple);
      color:white;
      box-shadow:0 10px 24px rgba(91,91,245,.30);
      font-size:30px;
      font-weight:300;
    }

    .month-control{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .month-control button{
      width:34px;height:34px;border:0;background:transparent;
      font-size:28px;color:var(--text);
    }

    .month-title{
      min-width:145px;
      text-align:center;
      font-weight:850;
      font-size:25px;
      letter-spacing:-.03em;
    }

    .section{
      margin-top:22px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .section-head h2{
      margin:0;
      font-size:20px;
      letter-spacing:-.02em;
    }

    .accounts-scroll{
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:minmax(210px,72%);
      gap:12px;
      overflow-x:auto;
      padding-bottom:4px;
      scroll-snap-type:x mandatory;
      scrollbar-width:none;
    }
    .accounts-scroll::-webkit-scrollbar{display:none}

    .account-card{
      scroll-snap-align:start;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:20px;
      padding:18px;
      min-height:210px;
      box-shadow:0 8px 22px rgba(35,49,85,.04);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .account-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .account-logo{
      width:54px;height:54px;border-radius:50%;
      display:grid;place-items:center;
      font-weight:900;font-size:20px;
    }

    .fd{background:#090909;color:white}
    .ll{background:#c9f4de;color:#122a24}
    .ba{background:#d7f3ff;color:#0694d9}

    .menu-dots{
      border:0;background:transparent;color:#8490a6;
      font-size:26px;line-height:1;
    }

    .account-name{
      font-size:18px;
      font-weight:750;
      margin-bottom:8px;
    }

    .balance-input{
      width:100%;
      border:0;
      padding:0;
      background:transparent;
      color:var(--text);
      font-size:28px;
      font-weight:850;
      outline:none;
    }

    .available{
      margin-top:8px;
      font-size:15px;
      font-weight:700;
      color:var(--green);
    }

    .filter-tabs{
      display:flex;
      gap:8px;
      background:#f1f3f7;
      border-radius:999px;
      padding:4px;
    }

    .filter-tabs button{
      border:0;
      background:transparent;
      color:#4d5870;
      padding:8px 15px;
      border-radius:999px;
      font-size:14px;
    }

    .filter-tabs button.active{
      background:var(--purple-soft);
      color:var(--purple);
      font-weight:750;
    }

    .payments{
      display:grid;
      gap:9px;
    }

    .payment-card{
      display:grid;
      grid-template-columns:48px minmax(0,1fr) auto 34px 26px;
      align-items:center;
      gap:12px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:13px 12px;
      min-height:82px;
      box-shadow:0 5px 16px rgba(35,49,85,.035);
    }

    .payment-card.paid{
      opacity:.68;
      background:#f7fbf9;
    }

    .payment-card.auto-payment{
      grid-template-columns:48px minmax(0,1fr) auto 26px;
    }

    .payment-icon{
      width:46px;height:46px;border-radius:50%;
      display:grid;place-items:center;
      background:#fff0e6;color:var(--orange);
      font-size:19px;font-weight:850;
    }

    .payment-card:nth-child(3n+2) .payment-icon{background:#eeebff;color:var(--purple)}
    .payment-card:nth-child(3n+3) .payment-icon{background:#e4f7ff;color:#149bd1}

    .payment-copy{min-width:0}
    .payment-name{
      font-size:16px;
      font-weight:780;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .payment-meta{
      margin-top:5px;
      color:var(--red);
      font-size:13px;
    }

    .payment-card.paid .payment-meta{color:var(--green)}

    .amount-input{
      width:94px;
      border:0;
      background:transparent;
      text-align:right;
      font-size:17px;
      font-weight:800;
      color:var(--text);
      padding:4px;
    }

    .check{
      width:28px;height:28px;
      border:2px solid #b7c0cf;
      border-radius:7px;
      background:white;
      display:grid;place-items:center;
      color:white;
      padding:0;
      font-size:17px;
    }

    .check.on{
      background:var(--green);
      border-color:var(--green);
    }

    .more{
      border:0;background:transparent;color:#8a95a9;
      font-size:22px;padding:0;
    }

    .payment-editor{
      grid-column:2 / -1;
      display:none;
      grid-template-columns:1fr 110px 110px auto;
      gap:8px;
      padding-top:10px;
      border-top:1px solid var(--line);
    }

    .payment-card.editing .payment-editor{display:grid}

    .payment-editor input{
      width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      padding:9px 10px;
      background:white;
    }

    .danger{
      border:0;border-radius:10px;
      padding:9px 12px;
      background:#fff0f0;color:var(--red);
    }

    .add-payment-panel{
      display:none;
      margin-top:12px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:18px;
      background:white;
      grid-template-columns:1fr 110px 100px auto;
      gap:9px;
    }
    .add-payment-panel.open{display:grid}
    .add-payment-panel input{
      width:100%;
      border:1px solid var(--line);
      border-radius:11px;
      padding:10px;
    }

    .primary{
      border:0;
      border-radius:11px;
      background:var(--purple);
      color:white;
      padding:10px 14px;
      font-weight:750;
    }

    .empty{
      border:1px dashed #cfd6e3;
      border-radius:18px;
      padding:30px 18px;
      text-align:center;
      color:var(--muted);
      background:white;
    }

    .month-history{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-bottom:4px;
      scrollbar-width:none;
    }
    .month-history::-webkit-scrollbar{display:none}
    .calendar-list,.settings-grid{display:grid;gap:12px}
    .calendar-item,label{border:1px solid var(--line);border-radius:18px;background:white;padding:14px}
    label{display:grid;gap:8px;font-weight:800} label small{font-weight:500;color:var(--muted)} textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;font:inherit}
    .calendar-item strong{display:block}.calendar-item span{color:var(--muted);font-size:13px}
    .month-pill{
      white-space:nowrap;
      border:1px solid var(--line);
      background:white;
      border-radius:999px;
      padding:8px 12px;
      color:var(--muted);
    }
    .month-pill.active{
      background:var(--purple);
      color:white;
      border-color:var(--purple);
    }

    .floating-summary{
      position:fixed;
      left:50%;
      bottom:76px;
      transform:translateX(-50%);
      z-index:40;
      width:min(calc(100% - 24px),880px);
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(20px);
      border:1px solid rgba(224,229,239,.95);
      border-radius:24px;
      box-shadow:0 16px 40px rgba(25,39,75,.18);
      padding:16px 14px 14px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .summary-grab{
      position:absolute;
      left:50%;top:6px;transform:translateX(-50%);
      width:46px;height:5px;border-radius:999px;background:#d8dde7;
    }

    .summary-item{
      padding:14px 8px 6px;
      text-align:center;
      min-width:0;
    }
    .summary-item + .summary-item{border-left:1px solid var(--line)}
    .summary-label{font-size:12px;color:var(--muted)}
    .summary-value{
      margin-top:6px;
      font-size:21px;
      font-weight:900;
      letter-spacing:-.04em;
      white-space:nowrap;
    }
    .summary-sub{
      margin-top:5px;
      font-size:11px;
      color:#8a95a8;
    }
    .summary-item:nth-child(2) .summary-value{color:var(--red)}
    .summary-item:nth-child(3) .summary-value{color:var(--green)}

    .bottom-nav{
      position:fixed;
      left:0;right:0;bottom:0;
      z-index:35;
      height:72px;
      padding-bottom:env(safe-area-inset-bottom);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(18px);
      border-top:1px solid var(--line);
    }

    .bottom-nav button{
      border:0;background:transparent;color:#69768f;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;font-size:12px;
    }
    .bottom-nav button.active{color:var(--purple)}
    .nav-icon{font-size:22px}

    @media (min-width:760px){
      body{padding-bottom:170px}
      .app-shell{padding:28px 28px 50px}
      .accounts-scroll{
        grid-auto-flow:initial;
        grid-template-columns:repeat(3,1fr);
        overflow:visible;
      }
      .account-card{min-height:220px}
      .payment-card{
        grid-template-columns:52px minmax(0,1fr) 130px 38px 28px;
        padding:14px 16px;
      }
      .payment-card.auto-payment{grid-template-columns:52px minmax(0,1fr) 130px 28px}
      .amount-input{width:120px}
      .floating-summary{bottom:24px}
      .bottom-nav{display:none}
    }

    @media (max-width:520px){
      .month-title{font-size:22px;min-width:125px}
      .filter-tabs button{padding:7px 11px;font-size:13px}
      .payment-card{grid-template-columns:46px minmax(0,1fr) 86px 30px 22px;gap:9px}
      .payment-card.auto-payment{grid-template-columns:46px minmax(0,1fr) 86px 22px}
      .amount-input{width:86px;font-size:16px}
      .payment-editor,.add-payment-panel{grid-template-columns:1fr 1fr}
      .summary-label{font-size:11px}
      .summary-value{font-size:18px}
      .summary-sub{display:none}
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="mobile-header">
      <button class="icon-btn" id="openSettings" aria-label="Settings">⚙</button>
      <div class="month-control">
        <button id="prevMonth" aria-label="Previous month">‹</button>
        <div class="month-title" id="monthLabel"></div>
        <button id="nextMonth" aria-label="Next month">›</button>
      </div>
      <button class="icon-btn add-btn" id="topAddPayment" aria-label="Add payment">+</button>
    </header>

    <section class="section overview-view">
      <div class="section-head">
        <h2>Accounts</h2>
      </div>

      <div class="accounts-scroll">
        <article class="account-card">
          <div class="account-top">
            <div class="account-logo fd">fd</div>
            <button class="menu-dots" aria-label="Account menu">⋮</button>
          </div>
          <div>
            <div class="account-name">First Direct</div>
            <input class="balance-input" id="firstDirect" type="text" inputmode="decimal" />
            <div class="available">Available</div>
          </div>
        </article>

        <article class="account-card">
          <div class="account-top">
            <div class="account-logo ll">L</div>
            <button class="menu-dots" aria-label="Account menu">⋮</button>
          </div>
          <div>
            <div class="account-name">Lloyds</div>
            <input class="balance-input" id="lloyds" type="text" inputmode="decimal" />
            <div class="available">Available</div>
          </div>
        </article>

        <article class="account-card">
          <div class="account-top">
            <div class="account-logo ba">B</div>
            <button class="menu-dots" aria-label="Account menu">⋮</button>
          </div>
          <div>
            <div class="account-name">Barclays</div>
            <input class="balance-input" id="barclays" type="text" inputmode="decimal" />
            <div class="available">Available</div>
          </div>
        </article>
      </div>
    </section>

    <section class="section overview-view">
      <div class="section-head">
        <h2>Payments for <span id="activePaydayLabel"></span></h2>
        <div class="filter-tabs">
          <button class="active" data-filter="all">All</button>
          <button data-filter="upcoming">Upcoming</button>
          <button data-filter="paid">Paid</button>
        </div>
      </div>

      <div class="payments" id="paymentsList"></div>

      <div class="add-payment-panel" id="addPanel">
        <input id="newName" placeholder="Payment name" />
        <input id="newAmount" type="number" step="0.01" placeholder="Amount" />
        <input id="newDay" type="number" min="1" max="31" placeholder="Due day" />
        <button class="primary" id="addPayment">Add</button>
      </div>
    </section>

    <section class="section app-view" id="calendarView" hidden>
      <div class="section-head"><h2>Payday calendar</h2></div>
      <div class="calendar-list" id="calendarList"></div>
    </section>

    <section class="section app-view" id="historyView" hidden>
      <div class="section-head"><h2>Payday history</h2></div>
      <div class="month-history" id="monthHistory"></div>
    </section>

    <section class="section app-view" id="settingsView" hidden>
      <div class="section-head"><h2>Settings</h2><button class="primary" id="saveSettings">Save</button></div>
      <div class="settings-grid">
        <label>Paydays <small>Use exact dates, one per line. The app builds periods from these dates instead of months.</small><textarea id="paydaysInput" rows="7"></textarea></label>
        <label>Daily food amount <small>Used to calculate Food automatically from the days left in the current pay cycle.</small><input id="dailyFoodAmount" type="number" step="0.01" min="0" /></label>
        <label>Daily petrol amount <small>Used to calculate Petrol automatically from the days left in the current pay cycle.</small><input id="dailyPetrolAmount" type="number" step="0.01" min="0" /></label>
        <div>
          <h3>Recurring payments</h3>
          <div id="recurringList" class="payments"></div>
          <div class="add-payment-panel open recurring-add">
            <input id="recName" placeholder="Name" />
            <input id="recAmount" type="number" step="0.01" placeholder="Amount" />
            <input id="recDay" type="number" min="1" max="31" placeholder="Due day" />
            <button class="primary" id="addRecurring">Add recurring</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <aside class="floating-summary" aria-label="Budget totals">
    <div class="summary-grab"></div>
    <div class="summary-item">
      <div class="summary-label">Total Available</div>
      <div class="summary-value" id="totalAvailable">£0.00</div>
      <div class="summary-sub">Across 3 accounts</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Left To Pay</div>
      <div class="summary-value" id="leftToPay">£0.00</div>
      <div class="summary-sub" id="remainingPayments">0 payments</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Projected Leftover</div>
      <div class="summary-value" id="leftover">£0.00</div>
      <div class="summary-sub">After all payments</div>
    </div>
  </aside>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="active" data-view="overview"><span class="nav-icon">⌂</span><span>Overview</span></button>
    <button data-view="calendar"><span class="nav-icon">▣</span><span>Calendar</span></button>
    <button data-view="history"><span class="nav-icon">↶</span><span>History</span></button>
    <button data-view="settings"><span class="nav-icon">⚙</span><span>Settings</span></button>
  </nav>

<script>
  const formatMoney = value => new Intl.NumberFormat('en-GB', {style:'currency', currency:'GBP'}).format(Number(value || 0));
  const pad = n => String(n).padStart(2,'0');
  const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const parseLocalDate = value => { const [y,m,d] = value.split('-').map(Number); return new Date(y, m - 1, d); };
  const paydayName = value => parseLocalDate(value).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  const parseMoney = value => Number(String(value || '').replace(/[^0-9.-]/g, '')) || 0;
  const isAutoDailyPayment = payment => ['food', 'petrol'].includes(String(payment.name || '').trim().toLowerCase());
  const dailyAmountFor = payment => String(payment.name || '').trim().toLowerCase() === 'food' ? Number(state.settings.dailyFoodAmount || 0) : Number(state.settings.dailyPetrolAmount || 0);
  function daysLeftInPayCycle(){
    const today = new Date(); today.setHours(0,0,0,0);
    const payday = parseLocalDate(currentPayday); payday.setHours(0,0,0,0);
    return Math.max(0, Math.ceil((payday - today) / 86400000));
  }
  function calculatedPaymentAmount(payment){
    return isAutoDailyPayment(payment) ? daysLeftInPayCycle() * dailyAmountFor(payment) : Number(payment.amount || 0);
  }
  function syncAutomaticPayments(){
    const data = ensurePayday();
    data.payments.forEach(payment => {
      if(isAutoDailyPayment(payment)){
        payment.paid = false;
        payment.amount = Number(calculatedPaymentAmount(payment).toFixed(2));
      }
    });
  }

  let state = {settings:{paydays:[], dailyFoodAmount:15, dailyPetrolAmount:3.71}, recurringPayments:[], months:{}};
  let currentPayday = null;
  let activeFilter = 'all';
  let activeView = 'overview';

  async function apiSave(){
    await fetch('api/budget', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state)});
  }

  function sortedPaydays(){
    return [...new Set(state.settings.paydays)].filter(Boolean).sort();
  }

  function nearestPayday(){
    const today = dateKey(new Date());
    const paydays = sortedPaydays();
    return paydays.find(day => day >= today) || paydays.at(-1) || today;
  }

  function ensurePayday(){
    if(!currentPayday) currentPayday = nearestPayday();
    if(!state.months[currentPayday]){
      state.months[currentPayday] = {
        balances:{firstDirect:0,lloyds:0,barclays:0},
        payments: state.recurringPayments.filter(p=>p.active !== false).map(p=>({...p,id:crypto.randomUUID?.() || String(Math.random()), recurringId:p.id, paid:false}))
      };
    }
    return state.months[currentPayday];
  }

  function dueDate(day){
    const base = parseLocalDate(currentPayday);
    const due = new Date(base.getFullYear(), base.getMonth(), Math.min(Number(day)||1,31));
    if(due < base) due.setMonth(due.getMonth()+1);
    return due;
  }

  function dueText(day, paid){
    return `${paid ? 'Paid' : 'Due'} ${dueDate(day).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  }

  function render(){
    const data = ensurePayday();
    document.getElementById('monthLabel').textContent = paydayName(currentPayday);
    document.getElementById('activePaydayLabel').textContent = paydayName(currentPayday);
    ['firstDirect','lloyds','barclays'].forEach(id=>{
      const input = document.getElementById(id);
      input.value = formatMoney(data.balances[id] || 0);
      input.onfocus = () => input.select();
      input.oninput = e => { data.balances[id] = parseMoney(e.target.value); apiSave(); updateSummary(); };
      input.onblur = () => input.value = formatMoney(data.balances[id] || 0);
    });
    renderPayments(); updateSummary(); renderHistory(); renderCalendar(); renderSettings(); setView(activeView);
  }

  function renderPayments(){
    syncAutomaticPayments();
    const data = ensurePayday(); const list = document.getElementById('paymentsList'); list.innerHTML = '';
    const filtered = data.payments.filter(p => activeFilter === 'all' || (activeFilter === 'paid' ? p.paid : !p.paid)).sort((a,b)=>Number(a.paid)-Number(b.paid) || dueDate(a.day)-dueDate(b.day));
    if(!filtered.length){ list.innerHTML = `<div class="empty">No ${activeFilter === 'all' ? '' : activeFilter} payments for this payday.</div>`; return; }
    filtered.forEach(payment=>{
      const row = document.createElement('article'); row.className = `payment-card ${payment.paid ? 'paid' : ''} ${isAutoDailyPayment(payment) ? 'auto-payment' : ''}`;
      row.innerHTML = `<div class="payment-icon">${payment.name.slice(0,2).toUpperCase()}</div><div class="payment-copy"><div class="payment-name">${payment.name}</div><div class="payment-meta">Payment date: ${payment.day || 1} · ${dueText(payment.day,payment.paid)}${isAutoDailyPayment(payment) ? ` · ${daysLeftInPayCycle()} days × ${formatMoney(dailyAmountFor(payment))}` : ''}</div></div><input class="amount-input" type="text" inputmode="decimal" value="${formatMoney(payment.amount)}" ${isAutoDailyPayment(payment) || payment.paid ? 'readonly' : ''}>${isAutoDailyPayment(payment) ? '' : `<button class="check ${payment.paid?'on':''}">${payment.paid?'✓':''}</button>`}<button class="more">⋮</button><div class="payment-editor"><input class="edit-name" value="${payment.name}" ${isAutoDailyPayment(payment) ? 'readonly' : ''}><input class="edit-day" type="number" min="1" max="31" value="${payment.day}"><input class="edit-amount" type="text" inputmode="decimal" value="${formatMoney(payment.amount)}" ${isAutoDailyPayment(payment) || payment.paid ? 'readonly' : ''}><button class="danger">Delete</button></div>`;
      row.querySelector('.amount-input').onchange = e => { if(isAutoDailyPayment(payment) || payment.paid) return; payment.amount = parseMoney(e.target.value); apiSave(); updateSummary(); renderPayments(); };
      const checkButton = row.querySelector('.check');
      if(checkButton) checkButton.onclick = () => { payment.paid = !payment.paid; apiSave(); render(); };
      row.querySelector('.more').onclick = () => row.classList.toggle('editing');
      row.querySelector('.edit-name').onchange = e => { payment.name = e.target.value.trim() || payment.name; apiSave(); renderPayments(); };
      row.querySelector('.edit-day').onchange = e => { payment.day = Math.max(1,Math.min(31,Number(e.target.value || 1))); apiSave(); renderPayments(); };
      row.querySelector('.edit-amount').onchange = e => { if(isAutoDailyPayment(payment) || payment.paid) return; payment.amount = parseMoney(e.target.value); apiSave(); render(); };
      row.querySelector('.danger').onclick = () => { data.payments = data.payments.filter(p=>p.id!==payment.id); apiSave(); render(); };
      list.appendChild(row);
    });
  }

  function updateSummary(){
    syncAutomaticPayments();
    const data = ensurePayday(); const total = Object.values(data.balances).reduce((a,b)=>a+Number(b||0),0); const unpaid = data.payments.filter(p=>!p.paid); const left = unpaid.reduce((a,p)=>a+calculatedPaymentAmount(p),0);
    document.getElementById('totalAvailable').textContent = formatMoney(total); document.getElementById('leftToPay').textContent = formatMoney(left); document.getElementById('leftover').textContent = formatMoney(total-left); document.getElementById('remainingPayments').textContent = `${unpaid.length} payment${unpaid.length===1?'':'s'}`;
  }

  function renderHistory(){
    const history = document.getElementById('monthHistory'); history.innerHTML = '';
    Object.keys(state.months).sort().forEach(key=>{ const btn=document.createElement('button'); btn.className=`month-pill ${key===currentPayday?'active':''}`; btn.textContent=paydayName(key); btn.onclick=()=>{currentPayday=key; activeView='overview'; render();}; history.appendChild(btn); });
  }

  function renderCalendar(){
    const list = document.getElementById('calendarList'); list.innerHTML='';
    sortedPaydays().forEach(day=>{ const data=state.months[day]; const item=document.createElement('div'); item.className='calendar-item'; item.innerHTML=`<strong>${paydayName(day)}</strong><span>${data ? `${data.payments.length} payments tracked` : 'Not started yet'}</span>`; item.onclick=()=>{currentPayday=day; activeView='overview'; render();}; list.appendChild(item); });
  }

  function renderSettings(){
    paydaysInput.value = sortedPaydays().join('\n'); dailyFoodAmount.value = Number(state.settings.dailyFoodAmount || 0).toFixed(2); dailyPetrolAmount.value = Number(state.settings.dailyPetrolAmount || 0).toFixed(2); recurringList.innerHTML='';
    state.recurringPayments.forEach(payment=>{ const row=document.createElement('article'); row.className='payment-card'; row.innerHTML=`<div class="payment-icon">${payment.name.slice(0,2).toUpperCase()}</div><div class="payment-copy"><div class="payment-name">${payment.name}</div><div class="payment-meta">Payment date: ${payment.day || 1} · Recurring every payday period</div></div><input class="amount-input" type="text" inputmode="decimal" value="${formatMoney(payment.amount)}"><button class="check ${payment.active!==false?'on':''}">${payment.active!==false?'✓':''}</button><button class="danger">×</button>`; row.querySelector('.amount-input').onchange=e=>{payment.amount=parseMoney(e.target.value); e.target.value=formatMoney(payment.amount); apiSave();}; row.querySelector('.check').onclick=()=>{payment.active=payment.active===false; apiSave(); renderSettings();}; row.querySelector('.danger').onclick=()=>{state.recurringPayments=state.recurringPayments.filter(p=>p.id!==payment.id); apiSave(); renderSettings();}; recurringList.appendChild(row); });
  }

  function setView(view){
    activeView=view; document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
    document.querySelectorAll('.app-view').forEach(v=>v.hidden=true);
    document.querySelectorAll('.overview-view').forEach(v=>v.hidden = view !== 'overview');
    document.querySelector('.floating-summary').hidden = view !== 'overview';
    ['calendar','history','settings'].forEach(v=>{ const el=document.getElementById(`${v}View`); if(el) el.hidden = view !== v; });
  }

  prevMonth.onclick = ()=>{ const p=sortedPaydays(); const i=p.indexOf(currentPayday); currentPayday=p[Math.max(0,i-1)] || currentPayday; render(); };
  nextMonth.onclick = ()=>{ const p=sortedPaydays(); const i=p.indexOf(currentPayday); currentPayday=p[Math.min(p.length-1,i+1)] || currentPayday; render(); };
  document.querySelectorAll('.filter-tabs button').forEach(button=>{ button.onclick=()=>{ activeFilter=button.dataset.filter; document.querySelectorAll('.filter-tabs button').forEach(b=>b.classList.remove('active')); button.classList.add('active'); renderPayments(); }; });
  topAddPayment.onclick = ()=>{ addPanel.classList.toggle('open'); if(addPanel.classList.contains('open')) newName.focus(); };
  addPayment.onclick = ()=>{ const data=ensurePayday(); const name=newName.value.trim(); if(!name) return; data.payments.push({id:crypto.randomUUID?.() || String(Date.now()), name, amount:Number(newAmount.value||0), day:Math.max(1,Math.min(31,Number(newDay.value||1))), paid:false}); newName.value=newAmount.value=newDay.value=''; addPanel.classList.remove('open'); apiSave(); render(); };
  addRecurring.onclick = ()=>{ const name=recName.value.trim(); if(!name) return; state.recurringPayments.push({id:crypto.randomUUID?.() || String(Date.now()), name, amount:Number(recAmount.value||0), day:Math.max(1,Math.min(31,Number(recDay.value||1))), active:true}); recName.value=recAmount.value=recDay.value=''; apiSave(); renderSettings(); };
  saveSettings.onclick = ()=>{ state.settings.paydays = paydaysInput.value.split(/\s+/).filter(Boolean).sort(); state.settings.dailyFoodAmount = parseMoney(dailyFoodAmount.value); state.settings.dailyPetrolAmount = parseMoney(dailyPetrolAmount.value); currentPayday = nearestPayday(); syncAutomaticPayments(); apiSave(); render(); };
  openSettings.onclick = ()=>{ setView('settings'); };
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.onclick=()=>setView(b.dataset.view));

  fetch('api/budget').then(r=>r.json()).then(data=>{ state=data; state.settings ||= {}; state.settings.dailyFoodAmount ??= 15; state.settings.dailyPetrolAmount ??= 3.71; currentPayday=nearestPayday(); render(); });
</script>
</body>
</html>
